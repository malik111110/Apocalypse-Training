# Apocalypse Platform — Podman Compose
# Usage: podman-compose up --build --wait
# Requires: podman, podman-compose

version: "3.9"

services:
  # ─── PostgreSQL ───
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: apocalypse-postgres
    restart: unless-stopped
    read_only: false  # postgres needs write access to data dir
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apocalypse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-apocalypse}
    volumes:
      - apocalypse-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - apocalypse-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ─── Redis ───
  redis:
    image: docker.io/redis:7-alpine
    container_name: apocalypse-redis
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - apocalypse-redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - apocalypse-backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Apocalypse Core (Backend API) ───
  apocalypse-core:
    build:
      context: ./Apocalypse-chat-core
      dockerfile: Containerfile
    container_name: apocalypse-core
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      APP_NAME: ${APP_NAME:-Apocalypse Core}
      APP_ENV: ${APP_ENV:-production}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_HTTP_ADDR: ${APP_HTTP_ADDR:-:8080}
      APP_API_PREFIX: ${APP_API_PREFIX:-/api}
      APP_MAX_TOOL_CALLS: ${APP_MAX_TOOL_CALLS:-3}
      APP_ENABLE_MOCK_LLM: ${APP_ENABLE_MOCK_LLM:-false}
      APP_DEFAULT_ORG_ID: ${APP_DEFAULT_ORG_ID:-org-default}

      APP_AUTH_REQUIRED: ${APP_AUTH_REQUIRED:-true}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRY_SECONDS: ${APP_JWT_EXPIRY_SECONDS:-3600}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}

      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      RATE_LIMIT_FAIL_OPEN: ${RATE_LIMIT_FAIL_OPEN:-false}

      MAX_REQUEST_SIZE_BYTES: ${MAX_REQUEST_SIZE_BYTES:-1048576}

      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-4096}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4-turbo-preview}

      REDIS_URL: ${REDIS_URL:-redis://apocalypse-redis:6379/0}
      APP_SESSION_STORE_BACKEND: ${APP_SESSION_STORE_BACKEND:-redis}
      APP_SESSION_TTL_SECONDS: ${APP_SESSION_TTL_SECONDS:-86400}
      APP_SESSION_MAX_MESSAGES: ${APP_SESSION_MAX_MESSAGES:-50}

      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://apocalypse:changeme@apocalypse-postgres:5432/apocalypse}
      APP_AUDIT_BACKEND: ${APP_AUDIT_BACKEND:-postgres}
      APP_IDENTITY_BACKEND: ${APP_IDENTITY_BACKEND:-postgres}

      OPENSANDBOX_BASE_URL: ${OPENSANDBOX_BASE_URL}
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY}
      OPENSANDBOX_EXECD_URL: ${OPENSANDBOX_EXECD_URL}
      OPENSANDBOX_EXECD_TOKEN: ${OPENSANDBOX_EXECD_TOKEN}
      OPENSANDBOX_TIMEOUT_SECONDS: ${OPENSANDBOX_TIMEOUT_SECONDS:-20}
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - apocalypse-backend
      - apocalypse-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ─── Apocalypse UI (React Frontend) ───
  apocalypse-ui:
    build:
      context: ./Apocalypse-chat-UI
      dockerfile: Containerfile
    container_name: apocalypse-ui
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      # No runtime secrets needed for static SPA; API base is baked at build time
      # or the SPA calls the same origin proxy.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - apocalypse-frontend
    depends_on:
      apocalypse-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M

volumes:
  apocalypse-postgres-data:
    driver: local
  apocalypse-redis-data:
    driver: local

networks:
  apocalypse-backend:
    driver: bridge
    internal: false
  apocalypse-frontend:
    driver: bridge
    internal: false
